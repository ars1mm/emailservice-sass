services:
  # Backend API
  - type: web
    name: emailshare-api
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: emailshare-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PADDLE_WEBHOOK_SECRET
        sync: false
      - key: PADDLE_API_KEY
        sync: false
      - key: PADDLE_STARTER_PRICE_ID
        value: pri_01kjt2qqa46sf5p2fc6sty342d
      - key: PADDLE_PRO_PRICE_ID
        value: pri_01kjt2qqsf62xwzv64q0g662t3
      - key: PADDLE_ENTERPRISE_PRICE_ID
        value: pri_01kjt2qr8s86qv2c4vwt3m7h3j

  # Frontend
  - type: web
    name: emailshare-frontend
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://emailshare-api.onrender.com
      - key: NEXT_PUBLIC_PADDLE_STARTER_PRICE_ID
        value: pri_01kjt2qqa46sf5p2fc6sty342d
      - key: NEXT_PUBLIC_PADDLE_PRO_PRICE_ID
        value: pri_01kjt2qqsf62xwzv64q0g662t3
      - key: NEXT_PUBLIC_PADDLE_ENTERPRISE_PRICE_ID
        value: pri_01kjt2qr8s86qv2c4vwt3m7h3j

databases:
  - name: emailshare-db
    plan: free
    databaseName: emailshare
    user: emailshare
