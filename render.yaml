services:
  # Backend API
  - type: web
    name: emailshare-api
    runtime: python
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: PADDLE_WEBHOOK_SECRET
        sync: false
      - key: PADDLE_API_KEY
        sync: false
      - key: PADDLE_STARTER_PRICE_ID
        value: pri_01kjt2qqa46sf5p2fc6sty342d
      - key: PADDLE_PRO_PRICE_ID
        value: pri_01kjt2qqsf62xwzv64q0g662t3
      - key: PADDLE_ENTERPRISE_PRICE_ID
        value: pri_01kjt2qr8s86qv2c4vwt3m7h3j
